<svg width="860" height="180" viewBox="0 0 860 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes slidein {
        from { stroke-dashoffset: 900; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes typing1 {
        from { width: 0; }
        to   { width: 340px; }
      }
      @keyframes typing2 {
        from { width: 0; }
        to   { width: 630px; }
      }
      @keyframes appear {
        to { opacity: 1; }
      }
      .topbar {
        stroke: #7F77DD; stroke-width: 1.5;
        stroke-dasharray: 900; stroke-dashoffset: 900;
        animation: slidein 1s ease forwards 0.1s;
        fill: none; opacity: 0.6;
      }
      .botbar {
        stroke: #1D9E75; stroke-width: 1.5;
        stroke-dasharray: 900; stroke-dashoffset: 900;
        animation: slidein 1s ease forwards 0.2s;
        fill: none; opacity: 0.6;
      }
    </style>
  </defs>

  <rect width="860" height="180" fill="#0d1117" rx="10"/>
  <line x1="0" y1="3" x2="860" y2="3" class="topbar"/>
  <line x1="0" y1="177" x2="860" y2="177" class="botbar"/>

  <foreignObject x="0" y="0" width="860" height="180">
    <div xmlns="http://www.w3.org/1999/xhtml" style="padding: 28px 40px 28px; box-sizing: border-box;">
      <style>
        @keyframes typing1x { from { width: 0 } to { width: 100% } }
        @keyframes typing2x { from { width: 0 } to { width: 100% } }
        @keyframes blinkx { 0%,100%{opacity:1} 50%{opacity:0} }
        @keyframes appearx { to { opacity: 1 } }
      </style>

      <div style="display:flex; align-items:baseline; gap:6px; margin-bottom:16px;">
        <span style="font-family:'Courier New',monospace; font-size:34px; font-weight:700; color:#1D9E75;">&gt;&nbsp;</span>
        <span style="font-family:'Courier New',monospace; font-size:34px; font-weight:700; color:#ffffff; overflow:hidden; white-space:nowrap; width:0; animation:typing1x 1.4s steps(22,end) forwards 0.3s; display:inline-block;">Hola! Soy Juan David 👋</span>
        <span style="font-family:'Courier New',monospace; font-size:34px; font-weight:700; color:#7F77DD; animation:blinkx 0.7s step-end infinite;">|</span>
      </div>

      <div style="display:flex; align-items:baseline; gap:6px; opacity:0; animation:appearx 0s forwards 2s;">
        <span style="font-family:'Courier New',monospace; font-size:14px; font-weight:700; color:#534AB7;">&gt;&nbsp;</span>
        <span style="font-family:'Courier New',monospace; font-size:14px; color:#9FE1CB; overflow:hidden; white-space:nowrap; width:0; animation:typing2x 2.2s steps(70,end) forwards 2.1s; display:inline-block;">PhD Candidate in NLP @UFF | AI Researcher | Deep Tech | GenAI &amp; LLMs</span>
        <span style="font-family:'Courier New',monospace; font-size:14px; color:#1D9E75; opacity:0; animation:appearx 0s forwards 2s, blinkx 0.7s step-end infinite 2.1s;">|</span>
      </div>
    </div>
  </foreignObject>
</svg>
